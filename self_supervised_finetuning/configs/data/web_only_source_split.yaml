# Experiment 3: Web-only source split.
# Splits by source_url/document_id BEFORE chunking so no chunk from the same source ever
# appears in more than one split. No web corpus ships with this repo yet — input_path must be
# supplied (via --web-input-path / an override) before this config can be used.
data:
  dataset_variant_slug: web-only-source-split
  source_type: web_corpus
  input_path: null
  split_strategy_slug: group-by-source
  split_strategy: group_by_source
  group_column: source_url
  seed: 42
  split_ratios:
    train: 0.80
    validation: 0.10
    test: 0.10
  text_format: cleaned_web_text
  max_seq_length: 2048
  chunk_stride: 0
  min_chars_per_doc: 200
  deduplicate_exact_text: true
  deduplicate_near_text: false
  packing: true
