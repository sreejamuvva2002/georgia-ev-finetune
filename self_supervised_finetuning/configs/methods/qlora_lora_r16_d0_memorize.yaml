# Control for the memorization sweep: the original default recipe (4-bit r16) but with dropout
# forced to 0 and no rsLoRA. Run alongside the r64+rsLoRA config to isolate how much of the loss
# drop comes from rank/rsLoRA vs. simply "zero dropout + many epochs" on the same data.
method:
  method_id_slug: qlora-lora-r16-a32-d0
  name: qlora_lora
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    bnb_4bit_use_double_quant: true
    bnb_4bit_compute_dtype: auto
  gradient_checkpointing: true
  prepare_model_for_kbit_training: true
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    use_rslora: false
    bias: none
    task_type: CAUSAL_LM
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
