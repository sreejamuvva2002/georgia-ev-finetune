# Placeholder for a future AdaLoRA (adaptive-rank LoRA) method. peft supports
# AdaLoraConfig; lora_factory.py raises NotImplementedError if this method is
# selected until that path is wired up. Kept here so sweeps/experiments can
# reference the slug now and the method can be dropped in later without
# reshaping any other config.
method:
  method_id_slug: adalora-placeholder
  name: adalora
  status: not_implemented
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    bnb_4bit_use_double_quant: true
    bnb_4bit_compute_dtype: auto
  gradient_checkpointing: true
  prepare_model_for_kbit_training: true
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: none
    task_type: CAUSAL_LM
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
