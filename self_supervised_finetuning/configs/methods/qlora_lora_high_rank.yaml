  gradient_checkpointing: true
  prepare_model_for_kbit_training: true
  lora:
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    bias: none
    task_type: CAUSAL_LM
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
