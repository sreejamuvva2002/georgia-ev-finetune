# Memorization-oriented QLoRA (4-bit NF4). High rank (r=64) + rsLoRA (alpha/sqrt(r) scaling,
# so gradients don't collapse at high rank) + ZERO dropout — the combination that most directly
# lowers *training* loss on a tiny set. Not for generalization: this deliberately overfits.
method:
  method_id_slug: qlora-lora-r64-a128-d0-rslora
  name: qlora_lora
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    bnb_4bit_use_double_quant: true
    bnb_4bit_compute_dtype: auto
  gradient_checkpointing: true
  prepare_model_for_kbit_training: true
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.0
    use_rslora: true
    bias: none
    task_type: CAUSAL_LM
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
