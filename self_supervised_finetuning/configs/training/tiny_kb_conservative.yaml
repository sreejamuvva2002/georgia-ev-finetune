# Safest default for the tiny KB company-split experiment. Effective batch size =
# per_device_train_batch_size * gradient_accumulation_steps * world_size = 1*16*1 = 16 on one
# GPU. Because the dataset is tiny, batch size 1 with grad accumulation 16 reduces memory
# pressure and stabilizes updates.
training:
  training_slug: ep8-bs1-ga16-ebs16-lr8e5-seq1024
  output_root: self_supervised_finetuning/outputs
  num_train_epochs: 8
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00008
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.0
  max_grad_norm: 0.3
  optim: paged_adamw_8bit
  logging_strategy: steps
  logging_steps: 1
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping:
    enabled: true
    patience: 2
    threshold: 0.0
  fp16: auto
  bf16: auto
  gradient_checkpointing: true
  report_to:
    - tensorboard
  seed: 42
  data_seed: 42
  dataloader_num_workers: 2
  remove_unused_columns: false
